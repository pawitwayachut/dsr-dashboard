<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPR DSR Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { text-align: center; padding: 2rem; }
        h1 { font-size: 2rem; color: #38bdf8; }
        p { color: #94a3b8; font-size: 1.1rem; }
        .badge { background: #22c55e; color: #fff; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.875rem; }
        .timestamp { color: #64748b; font-size: 0.85rem; margin-top: 2rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>OPR Daily Sales Report</h1>
        <p>Pipeline verified — <span class="badge">Auto-deploy Active</span></p>
        <p class="timestamp">Supersports Operations &bull; GitHub → Cloudflare Pages pipeline confirmed</p>
        <p class="timestamp">Last updated: $(date -u '+%Y-%m-%d %H:%M UTC')</p>
    </div>
</body>
</html>
